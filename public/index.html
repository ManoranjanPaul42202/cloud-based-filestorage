<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple App</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 8px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
  </style>
</head>

<body>

<h1>🚀 My Full Project Frontend</h1>

<!-- ================= SIGNUP ================= -->
<div class="section">
  <h2>Signup</h2>
  <input id="s_name" placeholder="Name"><br>
  <input id="s_email" placeholder="Email"><br>
  <input id="s_password" type="password" placeholder="Password"><br>
  <button onclick="signup()">Signup</button>
</div>

<!-- ================= LOGIN ================= -->
<div class="section">
  <h2>Login</h2>
  <input id="l_email" placeholder="Email"><br>
  <input id="l_password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- ================= UPLOAD ================= -->
<div class="section">
  <h2>Upload File (Demo)</h2>
  <input id="fileName" placeholder="File Name"><br>
  <textarea id="fileContent" placeholder="File Content"></textarea><br>
  <button onclick="upload()">Upload</button>
</div>

<!-- ================= FILES ================= -->
<div class="section">
  <h2>Get Files</h2>
  <button onclick="getFiles()">Load Files</button>
  <pre id="files"></pre>
</div>

<script>
const BASE_URL = "http://13.60.86.187:3000";

// 🔹 Signup
async function signup() {
  const res = await fetch(`${BASE_URL}/auth/signup`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("s_name").value,
      email: document.getElementById("s_email").value,
      password: document.getElementById("s_password").value
    })
  });

  const data = await res.json();
  alert(data.message || "Signup Done");
}

// 🔹 Login
async function login() {
  const res = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: document.getElementById("l_email").value,
      password: document.getElementById("l_password").value
    })
  });

  const data = await res.json();
  alert(data.message || "Login Done");
}

// 🔹 Upload (basic API call)
async function upload() {
  const res = await fetch(`${BASE_URL}/files/upload`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      fileName: document.getElementById("fileName").value,
      content: document.getElementById("fileContent").value
    })
  });

  const data = await res.json();
  alert(data.message || "Uploaded");
}

// 🔹 Get Files
async function getFiles() {
  const res = await fetch(`${BASE_URL}/files`);
  const data = await res.json();

  document.getElementById("files").innerText =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
